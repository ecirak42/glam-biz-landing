<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">Wedding Day Preview deliverable pages</title>
  <desc id="desc">Six stylized report pages showing face, color, skin, hair, makeup, and styling deliverables.</desc>
  <defs>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#2a2521" flood-opacity="0.10"/>
    </filter>
  </defs>
  <rect width="1400" height="900" rx="30" fill="#fbf7f3"/>
  <text x="700" y="72" text-anchor="middle" font-family="Georgia, serif" font-size="52" fill="#2a2521">What your Wedding Day Preview includes</text>
  <text x="700" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#6b5f54" letter-spacing="2">A SHAREABLE PDF BEAUTY BRIEF BUILT FROM YOUR PHOTOS</text>

  <g filter="url(#shadow)" font-family="Arial, sans-serif">
    <g transform="translate(92 165)">
      <rect width="360" height="286" rx="18" fill="#fff" stroke="#e9dfd3"/>
      <text x="28" y="44" font-family="Georgia, serif" font-size="30" fill="#2a2521">Face Features</text>
      <circle cx="92" cy="132" r="54" fill="#f4ece3" stroke="#e9dfd3"/>
      <path d="M58 138c9-39 59-39 68 0-12 32-56 32-68 0z" fill="#d6a585"/>
      <path d="M50 124c10-52 80-54 92 0-20-26-70-26-92 0z" fill="#70472f"/>
      <line x1="160" y1="94" x2="310" y2="94" stroke="#d9a7a0" stroke-width="5" stroke-linecap="round"/>
      <line x1="160" y1="132" x2="282" y2="132" stroke="#e9dfd3" stroke-width="8" stroke-linecap="round"/>
      <line x1="160" y1="166" x2="322" y2="166" stroke="#e9dfd3" stroke-width="8" stroke-linecap="round"/>
      <text x="28" y="232" font-size="15" fill="#6b5f54">Example: face shape, feature balance, best focus areas</text>
    </g>

    <g transform="translate(520 165)">
      <rect width="360" height="286" rx="18" fill="#fff" stroke="#e9dfd3"/>
      <text x="28" y="44" font-family="Georgia, serif" font-size="30" fill="#2a2521">Color Season</text>
      <rect x="30" y="82" width="54" height="90" rx="8" fill="#8c7b3e"/>
      <rect x="96" y="82" width="54" height="90" rx="8" fill="#c96f45"/>
      <rect x="162" y="82" width="54" height="90" rx="8" fill="#d5b58a"/>
      <rect x="228" y="82" width="54" height="90" rx="8" fill="#6e5946"/>
      <rect x="294" y="82" width="36" height="90" rx="8" fill="#efe0cf"/>
      <text x="28" y="220" font-size="15" fill="#6b5f54">Example: best colors, metals, neutrals, colors to avoid</text>
    </g>

    <g transform="translate(948 165)">
      <rect width="360" height="286" rx="18" fill="#fff" stroke="#e9dfd3"/>
      <text x="28" y="44" font-family="Georgia, serif" font-size="30" fill="#2a2521">Skin Prep</text>
      <circle cx="78" cy="116" r="36" fill="#d9a780"/>
      <circle cx="168" cy="116" r="36" fill="#e2b99d"/>
      <circle cx="258" cy="116" r="36" fill="#c99575"/>
      <line x1="42" y1="188" x2="312" y2="188" stroke="#e9dfd3" stroke-width="8" stroke-linecap="round"/>
      <line x1="42" y1="214" x2="250" y2="214" stroke="#e9dfd3" stroke-width="8" stroke-linecap="round"/>
      <text x="28" y="250" font-size="15" fill="#6b5f54">Example: oil, hydration, texture, wedding-week prep</text>
    </g>

    <g transform="translate(92 510)">
      <rect width="360" height="286" rx="18" fill="#fff" stroke="#e9dfd3"/>
      <text x="28" y="44" font-family="Georgia, serif" font-size="30" fill="#2a2521">Hair Direction</text>
      <rect x="34" y="82" width="84" height="104" rx="10" fill="#f4ece3" stroke="#e9dfd3"/>
      <rect x="138" y="82" width="84" height="104" rx="10" fill="#f4ece3" stroke="#e9dfd3"/>
      <rect x="242" y="82" width="84" height="104" rx="10" fill="#f4ece3" stroke="#e9dfd3"/>
      <path d="M54 136c18-44 44-44 62 0" fill="none" stroke="#70472f" stroke-width="9" stroke-linecap="round"/>
      <path d="M156 130c22-34 42-34 60 0" fill="none" stroke="#8b5a3e" stroke-width="9" stroke-linecap="round"/>
      <path d="M262 142c18-50 40-50 54 0" fill="none" stroke="#5b3a2a" stroke-width="9" stroke-linecap="round"/>
      <text x="28" y="232" font-size="15" fill="#6b5f54">Example: flattering styles, parting, volume, accessories</text>
    </g>

    <g transform="translate(520 510)">
      <rect width="360" height="286" rx="18" fill="#fff" stroke="#e9dfd3"/>
      <text x="28" y="44" font-family="Georgia, serif" font-size="30" fill="#2a2521">Makeup Plan</text>
      <ellipse cx="96" cy="122" rx="50" ry="22" fill="#f0c5a6"/>
      <ellipse cx="96" cy="122" rx="21" ry="18" fill="#6b432e"/>
      <circle cx="224" cy="112" r="30" fill="#c77c68"/>
      <circle cx="282" cy="112" r="30" fill="#9c6044"/>
      <rect x="48" y="180" width="260" height="10" rx="5" fill="#e9dfd3"/>
      <rect x="48" y="206" width="216" height="10" rx="5" fill="#e9dfd3"/>
      <text x="28" y="250" font-size="15" fill="#6b5f54">Example: eyes, lips, blush, contour, finish, products</text>
    </g>

    <g transform="translate(948 510)">
      <rect width="360" height="286" rx="18" fill="#fff" stroke="#e9dfd3"/>
      <text x="28" y="44" font-family="Georgia, serif" font-size="30" fill="#2a2521">Styling Capsule</text>
      <path d="M72 184l42-102 42 102z" fill="#f2e6d8" stroke="#c4a878"/>
      <path d="M168 184l42-102 42 102z" fill="#8fa08c" stroke="#6b5f54"/>
      <path d="M264 184l42-102 42 102z" fill="#3f3028" stroke="#2a2521"/>
      <text x="28" y="232" font-size="15" fill="#6b5f54">Example: rehearsal, getting-ready, after-party looks</text>
    </g>
  </g>
</svg>
