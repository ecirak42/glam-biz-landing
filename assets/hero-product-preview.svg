      <path d="M77 124c15 11 33 11 48 0" fill="none" stroke="#8f5d49" stroke-width="4" stroke-linecap="round"/>
      <text x="92" y="202" text-anchor="middle" font-family="Georgia, serif" font-size="24" fill="#2a2521">Face Features</text>
      <text x="92" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#6b5f54">shape, balance, feature focus</text>
    </g>

    <g transform="translate(446 270)">
