      <rect x="0" y="22" width="62" height="86" rx="8" fill="#8c7b3e"/>
      <rect x="74" y="22" width="62" height="86" rx="8" fill="#c96f45"/>
      <rect x="148" y="22" width="62" height="86" rx="8" fill="#d5b58a"/>
      <rect x="222" y="22" width="62" height="86" rx="8" fill="#6e5946"/>
      <rect x="0" y="132" width="284" height="10" rx="5" fill="#e9dfd3"/>
