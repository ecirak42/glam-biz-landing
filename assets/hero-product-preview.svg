<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1125" role="img" aria-labelledby="title desc">
  <title id="title">Wedding Day Preview product mockup</title>
  <desc id="desc">A stylized preview of the personalized bridal beauty PDF with face, color, hair, makeup, skin, and styling pages.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fbf7f3"/>
      <stop offset="0.55" stop-color="#f4ece3"/>
      <stop offset="1" stop-color="#ead9ca"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#fbf7f3"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="22" flood-color="#2a2521" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="900" height="1125" rx="28" fill="url(#bg)"/>
  <circle cx="124" cy="162" r="92" fill="#d9a7a0" opacity="0.20"/>
  <circle cx="784" cy="964" r="130" fill="#c4a878" opacity="0.18"/>

  <g filter="url(#shadow)">
    <rect x="151" y="116" width="598" height="842" rx="20" fill="url(#paper)" stroke="#e9dfd3" stroke-width="2"/>
    <rect x="181" y="146" width="538" height="82" rx="12" fill="#2a2521"/>
    <text x="450" y="178" text-anchor="middle" font-family="Georgia, serif" font-size="28" fill="#fbf7f3" letter-spacing="3">WEDDING DAY PREVIEW</text>
    <text x="450" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#c4a878" letter-spacing="4">PERSONAL BEAUTY PDF</text>

    <g transform="translate(209 262)">
